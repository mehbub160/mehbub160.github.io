<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExamPortal – Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:   #0D1B2A;
      --navy2:  #1B2E45;
      --blue:   #2563EB;
      --blue-lt:#3B82F6;
      --sky:    #EFF6FF;
      --success:#059669;
      --danger: #DC2626;
      --warning:#D97706;
      --text:   #0F172A;
      --muted:  #64748B;
      --border: #E2E8F0;
      --card:   #FFFFFF;
      --bg:     #F0F5FF;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* ── TOP NAVBAR ── */
    .navbar {
      background: var(--navy);
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-brand {
      font-family:'Outfit',sans-serif; font-size:1.25rem; font-weight:700;
      color:#fff; text-decoration:none; display:flex; align-items:center; gap:0.5rem;
    }
    .nav-brand span { color:var(--blue-lt); }
    .nav-right { display:flex; align-items:center; gap:1rem; }
    .nav-user {
      display:flex; align-items:center; gap:0.6rem;
      color:rgba(255,255,255,0.8); font-size:0.9rem;
    }
    .avatar {
      width:34px; height:34px; border-radius:50%;
      background:var(--blue); color:#fff;
      display:flex; align-items:center; justify-content:center;
      font-family:'Outfit',sans-serif; font-weight:600; font-size:0.85rem;
    }
    .btn-nav {
      padding:0.45rem 1rem; border-radius:7px;
      background:rgba(255,255,255,0.1); color:#fff;
      border:1px solid rgba(255,255,255,0.15); font-family:'DM Sans',sans-serif;
      font-size:0.85rem; cursor:pointer; transition:background 0.2s;
      text-decoration:none; display:inline-flex; align-items:center; gap:0.4rem;
    }
    .btn-nav:hover { background:rgba(255,255,255,0.2); }

    /* ── MAIN LAYOUT ── */
    .main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem; }

    /* ── WELCOME BANNER ── */
    .welcome-banner {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
      border-radius: 16px; padding: 2rem 2.5rem;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 2.5rem; overflow: hidden; position: relative;
    }
    .welcome-banner::after {
      content:''; position:absolute; right:-40px; top:-40px;
      width:200px; height:200px; border-radius:50%;
      border:50px solid rgba(37,99,235,0.1);
    }
    .welcome-text h2 {
      font-family:'Outfit',sans-serif; font-size:1.5rem; font-weight:700;
      color:#fff; margin-bottom:0.3rem;
    }
    .welcome-text p { color:rgba(255,255,255,0.55); font-size:0.9rem; }
    .welcome-icon { font-size:3.5rem; opacity:0.6; }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem;
      margin-bottom: 2.5rem;
    }
    .stat-card {
      background: var(--card); border-radius: 14px;
      padding: 1.4rem 1.5rem; border: 1px solid var(--border);
      display: flex; align-items: center; gap: 1rem;
    }
    .stat-icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
    }
    .stat-icon.blue   { background: #EFF6FF; }
    .stat-icon.green  { background: #ECFDF5; }
    .stat-icon.orange { background: #FFF7ED; }
    .stat-info h3 { font-family:'Outfit',sans-serif; font-size:1.6rem; font-weight:700; }
    .stat-info p  { font-size:0.8rem; color:var(--muted); font-weight:500; }

    /* ── SECTION TITLE ── */
    .section-title {
      font-family:'Outfit',sans-serif; font-size:1.2rem; font-weight:700;
      color:var(--text); margin-bottom:1.25rem;
      display:flex; align-items:center; gap:0.5rem;
    }
    .section-title span { font-size:1.1rem; }

    /* ── EXAM CARDS GRID ── */
    .exams-grid {
      display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr));
      gap: 1.25rem; margin-bottom: 2.5rem;
    }
    .exam-card {
      background: var(--card); border-radius: 14px;
      border: 1px solid var(--border); overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .exam-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.08); }

    .exam-card-top {
      height: 8px;
    }
    .exam-card-body { padding: 1.4rem; }
    .exam-subject {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; margin-bottom: 0.5rem;
    }
    .exam-title {
      font-family:'Outfit',sans-serif; font-size:1.05rem; font-weight:700;
      color:var(--text); margin-bottom:0.5rem; line-height:1.3;
    }
    .exam-desc { font-size:0.82rem; color:var(--muted); margin-bottom:1.25rem; line-height:1.5; }
    .exam-meta {
      display:flex; gap:1rem; margin-bottom:1.25rem;
    }
    .meta-item {
      display:flex; align-items:center; gap:0.3rem;
      font-size:0.78rem; color:var(--muted);
    }

    .btn-start {
      display:block; width:100%; text-align:center;
      padding:0.7rem; background:var(--blue);
      color:#fff; border:none; border-radius:9px;
      font-family:'Outfit',sans-serif; font-size:0.9rem; font-weight:600;
      cursor:pointer; transition:background 0.2s; text-decoration:none;
    }
    .btn-start:hover { background:#1D4ED8; }

    .btn-attempted {
      display:block; width:100%; text-align:center;
      padding:0.7rem; background:#F1F5F9;
      color:var(--muted); border:1px solid var(--border); border-radius:9px;
      font-size:0.85rem; cursor:not-allowed;
    }

    /* ── RESULTS TABLE ── */
    .results-card {
      background: var(--card); border-radius: 14px; border: 1px solid var(--border);
      overflow: hidden;
    }
    .results-table { width:100%; border-collapse:collapse; }
    .results-table th {
      background:#F8FAFC; padding:0.85rem 1.2rem; text-align:left;
      font-size:0.75rem; font-weight:700; text-transform:uppercase;
      letter-spacing:0.05em; color:var(--muted); border-bottom:1px solid var(--border);
    }
    .results-table td {
      padding:0.9rem 1.2rem; border-bottom:1px solid var(--border);
      font-size:0.88rem; vertical-align:middle;
    }
    .results-table tr:last-child td { border-bottom:none; }
    .results-table tr:hover td { background:#F8FAFC; }
    .badge {
      display:inline-block; padding:0.25rem 0.65rem; border-radius:6px;
      font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.04em;
    }
    .badge-pass { background:#ECFDF5; color:#059669; }
    .badge-fail { background:#FEF2F2; color:#DC2626; }
    .empty-state {
      padding:3rem; text-align:center; color:var(--muted);
    }
    .empty-state .icon { font-size:3rem; margin-bottom:0.75rem; }
    .empty-state p { font-size:0.9rem; }

    @media(max-width:700px){
      .stats-row { grid-template-columns:1fr; }
      .welcome-icon { display:none; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="dashboard.html" class="nav-brand">📋 Exam<span>Portal</span></a>
  <div class="nav-right">
    <div class="nav-user">
      <div class="avatar" id="nav-avatar">?</div>
      <span id="nav-name">Loading…</span>
    </div>
    <button class="btn-nav" onclick="logout()">🚪 Logout</button>
  </div>
</nav>

<main class="main">

  <!-- WELCOME BANNER -->
  <div class="welcome-banner">
    <div class="welcome-text">
      <h2 id="welcome-msg">Welcome back! 👋</h2>
      <p>Select an exam below to begin. Good luck!</p>
    </div>
    <div class="welcome-icon">🎓</div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon blue">📝</div>
      <div class="stat-info"><h3 id="stat-total">0</h3><p>Total Exams</p></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">✅</div>
      <div class="stat-info"><h3 id="stat-attempted">0</h3><p>Attempted</p></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon orange">⏳</div>
      <div class="stat-info"><h3 id="stat-pending">0</h3><p>Remaining</p></div>
    </div>
  </div>

  <!-- AVAILABLE EXAMS -->
  <div class="section-title"><span>📚</span> Available Exams</div>
  <div class="exams-grid" id="exams-grid">
    <p style="color:var(--muted);font-size:0.9rem">Loading exams…</p>
  </div>

  <!-- PAST RESULTS -->
  <div class="section-title"><span>📊</span> Your Results</div>
  <div class="results-card">
    <div id="results-body">
      <div class="empty-state">
        <div class="icon">🗂️</div>
        <p>No results yet. Attempt an exam to see your scores here.</p>
      </div>
    </div>
  </div>

</main>

<script src="js/app.js"></script>
<script>
  // ── Auth guard ──
  const user = requireAuth("student");
  if (!user) throw new Error("Not authenticated");

  // ── Populate nav ──
  document.getElementById("nav-avatar").textContent = user.name.charAt(0).toUpperCase();
  document.getElementById("nav-name").textContent   = user.name;
  document.getElementById("welcome-msg").textContent = `Welcome back, ${user.name.split(" ")[0]}! 👋`;

  // ── Colour palette for exam cards ──
  const COLOURS = [
    { top:"#2563EB", subject:"#2563EB" },
    { top:"#059669", subject:"#059669" },
    { top:"#7C3AED", subject:"#7C3AED" },
    { top:"#D97706", subject:"#D97706" }
  ];

  // ── Render exams ──
  function renderExams() {
    const exams   = getExams().filter(e => e.status === "active");
    const results = getResultsForUser(user.userId);
    const grid    = document.getElementById("exams-grid");
    grid.innerHTML = "";

    document.getElementById("stat-total").textContent     = exams.length;
    document.getElementById("stat-attempted").textContent = results.length;
    document.getElementById("stat-pending").textContent   = Math.max(0, exams.length - results.length);

    if (exams.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="padding:2rem"><div class="icon">📭</div><p>No exams available right now.</p></div>`;
      return;
    }

    exams.forEach((exam, idx) => {
      const col       = COLOURS[idx % COLOURS.length];
      const attempted = results.some(r => r.examId === exam.id);
      const result    = results.find(r => r.examId === exam.id);
      const card      = document.createElement("div");
      card.className  = "exam-card";
      card.innerHTML  = `
        <div class="exam-card-top" style="background:${col.top}"></div>
        <div class="exam-card-body">
          <div class="exam-subject" style="color:${col.subject}">${exam.subject}</div>
          <div class="exam-title">${exam.title}</div>
          <div class="exam-desc">${exam.description}</div>
          <div class="exam-meta">
            <div class="meta-item">⏱ ${exam.duration} min</div>
            <div class="meta-item">❓ ${exam.questions.length} Qs</div>
            <div class="meta-item">📈 ${exam.totalMarks} marks</div>
          </div>
          ${attempted
            ? `<div class="btn-attempted">✅ Attempted — Score: ${result.score}/${exam.totalMarks}</div>`
            : `<button class="btn-start" onclick="startExam('${exam.id}')">Start Exam →</button>`
          }
        </div>`;
      grid.appendChild(card);
    });
  }

  // ── Start exam ──
  function startExam(examId) {
    if (hasAttempted(user.userId, examId)) {
      toast("You have already attempted this exam.", "warning"); return;
    }
    // Store intent in sessionStorage so exam.html can pick it up
    sessionStorage.setItem("ep_current_exam", examId);
    window.location.href = "exam.html";
  }

  // ── Render results table ──
  function renderResults() {
    const results = getResultsForUser(user.userId);
    const exams   = getExams();
    const body    = document.getElementById("results-body");
    if (results.length === 0) return;  // keep empty state

    body.innerHTML = `
      <table class="results-table">
        <thead>
          <tr>
            <th>#</th><th>Exam</th><th>Score</th><th>Correct</th>
            <th>Wrong</th><th>Status</th><th>Date</th>
          </tr>
        </thead>
        <tbody>
          ${results.map((r,i) => {
            const exam = exams.find(e => e.id === r.examId);
            return `<tr>
              <td>${i+1}</td>
              <td><strong>${exam ? exam.title : r.examId}</strong></td>
              <td><strong>${r.score}/${r.maxScore}</strong></td>
              <td style="color:var(--success)"><strong>${r.correct}</strong></td>
              <td style="color:var(--danger)"><strong>${r.wrong}</strong></td>
              <td><span class="badge ${r.passed ? 'badge-pass' : 'badge-fail'}">${r.passed ? 'PASS' : 'FAIL'}</span></td>
              <td style="color:var(--muted)">${fmtDate(r.submittedAt)}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>`;
  }

  renderExams();
  renderResults();
</script>
</body>
</html>
