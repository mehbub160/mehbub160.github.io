<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Portifolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>  
 <section>
        <nav class="navbar">
        <ul class="nav-links">
            <li><a href="index.html"> Home </a></li>
            <li><a href="about.html"> About Me</a></li>
            <li><a href="research.html"> Research & Publications</a></li>
            <li><a href="contact.html"> Contact </a></li>
        </ul>
    </nav>
    </section>
<section class="contact-section">
    <div class="contact-container">
        <div class="contact-form">
    <h2>Get in Touch</h2>
    <input type="text" id="name" placeholder="Name">
    <input type="email" id="email" placeholder="Email">
    <textarea id="message" placeholder="Message"></textarea>
    <button onclick="sendMessage()">Send Message</button>
</div>
<div class="contact-map">
    <iframe 
        src="https://www.google.com/maps?q=IIIT%20Raichur&output=embed"
        width="100%" 
        height="100%" 
        style="border:0;" 
        allowfullscreen="" 
        loading="lazy">
    </iframe>
</div>
        <div class="contact-info">

            <div class="info-box">
                <h3>Office Location</h3>
                <p>Room no:211<br>
                Academic Building,IIIT Raichur<br>
                Karnataka, India</p>
            </div>

            <div class="info-box">
                <h3>Contact Directory</h3>
                <p>Email: mehbub@iiitg.ac.in</p>
                <p>Phone: +91 80111 17277</p>
            </div>
        </div>
    </div>
</section>
<script>
function sendMessage() {
    var name = document.getElementById("name").value;
    var email = document.getElementById("email").value;
    var message = document.getElementById("message").value;
    var webhookURL = "";

    var data = {
        content: "**New Contact Form Message**",
        embeds: [{
            title: "CyberSecure Lab Contact",
            color: 5814783,
            fields: [
                {
                    name: "Name",
                    value: name
                },
                {
                    name: "Email",
                    value: email
                },
                {
                    name: "Message",
                    value: message
                }
            ]
        }]
    };

    fetch(webhookURL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(response => {
        alert("Message Sent Successfully!");
    })
    .catch(error => {
        alert("Error sending message");
    });
}

</script>
</body>
</html>
